name: Compilar eMule Eagle
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Extraer ZIP
      shell: pwsh
      run: |
        $zip = Get-ChildItem -Filter "*.zip" | Select-Object -First 1
        Expand-Archive $zip.FullName -DestinationPath extracted
        Copy-Item "extracted\eMule-Eagle\*" . -Recurse -Force
    - name: Compilar Crypto++
      shell: pwsh
      run: |
        Invoke-WebRequest "https://github.com/weidai11/cryptopp/archive/refs/tags/CRYPTOPP_8_9_0.zip" -OutFile cryptopp.zip
        Expand-Archive cryptopp.zip -DestinationPath .
        Rename-Item "cryptopp-CRYPTOPP_8_9_0" "cryptopp"
        $p = Get-ChildItem cryptopp -Filter "cryptlib.vcxproj" -Recurse | Select-Object -First 1
        msbuild $p.FullName /p:Configuration=Release /p:Platform=x64 /m /nologo /verbosity:minimal
    - name: Compilar zlib
      shell: pwsh
      run: |
        Invoke-WebRequest "https://github.com/madler/zlib/archive/refs/tags/v1.3.1.zip" -OutFile zlib.zip
        Expand-Archive zlib.zip -DestinationPath .
        Rename-Item "zlib-1.3.1" "zlib"
        cmake -S zlib -B zlib/build_x64 -G "Visual Studio 17 2022" -A x64
        cmake --build zlib/build_x64 --config Release
        $dest = "zlib\contrib\vstudio\vc\x64\Release"
        New-Item -ItemType Directory -Force -Path $dest | Out-Null
        $lib = Get-ChildItem zlib/build_x64 -Filter "*.lib" -Recurse | Select-Object -First 1
        Copy-Item $lib.FullName "$dest\zlib.lib" -Force
    - name: Compilar miniupnpc
      shell: pwsh
      run: |
        Invoke-WebRequest "https://github.com/miniupnp/miniupnp/archive/refs/tags/miniupnpc_2_2_8.zip" -OutFile miniupnpc.zip
        Expand-Archive miniupnpc.zip -DestinationPath miniupnpc_tmp
        $inner = Get-ChildItem miniupnpc_tmp -Recurse -Filter "CMakeLists.txt" | Where-Object { $_.Directory.Name -eq "miniupnpc" } | Select-Object -First 1
        cmake -S $inner.DirectoryName -B miniupnpc_build -G "Visual Studio 17 2022" -A x64 -DUPNPC_BUILD_STATIC=ON -DUPNPC_BUILD_SHARED=OFF
        cmake --build miniupnpc_build --config Release
        $dest2 = "miniupnpc\msvc\x64\Release"
        New-Item -ItemType Directory -Force -Path $dest2 | Out-Null
        $lib2 = Get-ChildItem miniupnpc_build -Filter "miniupnpc.lib" -Recurse | Select-Object -First 1
        Copy-Item $lib2.FullName "$dest2\miniupnpc.lib" -Force
        New-Item -ItemType Directory -Force -Path "miniupnpc\include" | Out-Null
        Get-ChildItem $inner.DirectoryName -Filter "*.h" | Copy-Item -Destination "miniupnpc\include"
    - name: Compilar id3lib
      shell: pwsh
      run: |
        Invoke-WebRequest "https://github.com/emule-project/id3lib/archive/refs/heads/master.zip" -OutFile id3lib.zip
        Expand-Archive id3lib.zip -DestinationPath .
        Rename-Item "id3lib-master" "id3lib"
        $p = Get-ChildItem id3lib -Filter "id3lib.vcxproj" -Recurse | Select-Object -First 1
        if ($p) { msbuild $p.FullName /p:Configuration=Release /p:Platform=x64 /m /nologo /verbosity:minimal }
    - name: Compilar ResizableLib
      shell: pwsh
      run: |
        Invoke-WebRequest "https://github.com/ppescher/resizablelib/archive/refs/heads/master.zip" -OutFile resizablelib.zip
        Expand-Archive resizablelib.zip -DestinationPath .
        Rename-Item "resizablelib-master" "resizablelib"
        $p = Get-ChildItem resizablelib -Filter "ResizableLib.vcxproj" -Recurse | Select-Object -First 1
        if ($p) { msbuild $p.FullName /p:Configuration=Release /p:Platform=x64 /m /nologo /verbosity:minimal }
    - name: Compilar libtorrent
      shell: pwsh
      run: |
        Invoke-WebRequest "https://github.com/arvidn/libtorrent/archive/refs/tags/v2.0.10.zip" -OutFile libtorrent.zip
        Expand-Archive libtorrent.zip -DestinationPath libtorrent_tmp
        $src = Get-ChildItem libtorrent_tmp -Directory | Select-Object -First 1
        Rename-Item $src.FullName "${{ github.workspace }}\libtorrent_src"
        cmake -S libtorrent_src -B libtorrent/build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -Dstatic_runtime=ON -Dbuild_tests=OFF -Dbuild_examples=OFF -Dbuild_tools=OFF
        cmake --build libtorrent/build --config Release
        New-Item -ItemType Directory -Force -Path "libtorrent\include" | Out-Null
        Copy-Item "libtorrent_src\include\*" "libtorrent\include\" -Recurse -Force
    - name: Compilar eMule Eagle
      shell: pwsh
      run: |
        msbuild srchybrid\emule.sln /p:Configuration=Release /p:Platform=x64 /m /nologo /verbosity:minimal
    - name: Subir exe
      uses: actions/upload-artifact@v4
      with:
        name: eMule-Eagle-exe
        path: srchybrid/x64/Release/eMule.exe
        retention-days: 30
        if-no-files-found: error
