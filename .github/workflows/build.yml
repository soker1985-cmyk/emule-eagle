- name: Compilar Crypto++
      shell: pwsh
      run: |
        Invoke-WebRequest "https://github.com/weidai11/cryptopp/archive/refs/tags/CRYPTOPP_8_9_0.zip" -OutFile cryptopp.zip
        Expand-Archive cryptopp.zip -DestinationPath .
        Rename-Item "cryptopp-CRYPTOPP_8_9_0" "cryptopp"
        cmake -S cryptopp -B cryptopp/build -G "Visual Studio 17 2022" -A x64
        cmake --build cryptopp/build --config Release
        New-Item -ItemType Directory -Force -Path "cryptopp\x64\Release" | Out-Null
        $lib = Get-ChildItem cryptopp/build -Filter "*.lib" -Recurse | Select-Object -First 1
        Copy-Item $lib.FullName "cryptopp\x64\Release\cryptlib.lib" -Force

